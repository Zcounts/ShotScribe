name: Production Web Build Artifact

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-web-artifact:
    name: Build production web artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build production web app (SiteGround mode)
        run: npm run build:web
        env:
          VITE_CONVEX_URL: ${{ secrets.VITE_CONVEX_URL }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
          VITE_AUTH_ISSUER_URL: ${{ secrets.VITE_AUTH_ISSUER_URL }}
          VITE_AUTH_AUDIENCE: ${{ secrets.VITE_AUTH_AUDIENCE }}
          VITE_AUTH_CLIENT_ID: ${{ secrets.VITE_AUTH_CLIENT_ID }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_ENABLE_CLOUD_FEATURES: ${{ secrets.VITE_ENABLE_CLOUD_FEATURES }}
          VITE_MONITORING_ENDPOINT: ${{ secrets.VITE_MONITORING_ENDPOINT }}

      - name: Verify build output directory
        run: test -f dist-siteground/index.html

      - name: Create SiteGround upload zip
        run: |
          rm -f shot-scribe-siteground-package.zip
          cd dist-siteground
          zip -r ../shot-scribe-siteground-package.zip .

      - name: Upload production web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: shot-scribe-siteground-package
          path: |
            dist-siteground
            shot-scribe-siteground-package.zip
          if-no-files-found: error
